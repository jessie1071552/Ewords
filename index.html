<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マルチ対応 英単語練習アプリ</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --warning-color: #e67e22;
            --dark-color: #2c3e50;
            --gray-color: #7f8c8d;
        }
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: 10px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { text-align: center; color: var(--dark-color); font-size: 24px; margin-bottom: 20px; }
        .setting-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 16px; }
        select, input, button { width: 100%; padding: 15px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        
        button { color: white; border: none; font-weight: bold; cursor: pointer; transition: transform 0.1s, background-color: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.98); }
        .primary-btn { background-color: var(--primary-color); }
        
        .card { background: #ecf0f1; padding: 30px 15px; border-radius: 8px; text-align: center; font-size: 26px; font-weight: bold; margin-bottom: 20px; position: relative; min-height: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; word-break: break-word; transition: background-color 0.5s ease; color: #333; }
        .example { font-size: 16px; color: #555; margin-top: 15px; text-align: left; background: #fff; padding: 12px; border-left: 4px solid var(--primary-color); border-radius: 0 8px 8px 0; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 10px; }
        @media(min-width: 480px) { .btn-grid { grid-template-columns: 1fr 1fr; } }
        
        .option-btn { background-color: #fff; color: #333; border: 2px solid var(--primary-color); padding: 18px 10px; font-size: 16px; }
        .option-btn:hover { background-color: #e8f4fd; }
        .audio-btn { background-color: var(--success-color); margin-bottom: 15px; padding: 12px; }
        
        /* わからない・やめるボタン用の独立スタイル */
        .action-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 25px; }
        .dont-know-btn { background-color: var(--warning-color); padding: 15px; }
        .quit-btn { background-color: var(--gray-color); padding: 15px; }
        
        .timer-wrapper { background: #e0e0e0; border-radius: 4px; height: 8px; margin-bottom: 15px; overflow: hidden; }
        .timer-bar { background: var(--warning-color); height: 100%; width: 100%; transition: width 1s linear; }
        .timer-text { font-size: 14px; font-weight: bold; color: var(--error-color); text-align: right; margin-bottom: 5px; }

        .correct-flash { background-color: rgba(46, 204, 113, 0.3) !important; animation: pop 0.4s ease; }
        .incorrect-flash { background-color: rgba(231, 76, 60, 0.3) !important; animation: shake 0.4s ease; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        
        .hidden { display: none; }
        .info-text { font-size: 15px; color: #666; text-align: center; margin-bottom: 10px; }
        
        .chart-container { margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .chart-row { display: flex; align-items: center; margin-bottom: 8px; }
        .chart-label { width: 90px; font-size: 13px; font-weight: bold; }
        .chart-bar-wrapper { flex-grow: 1; background: #e0e0e0; border-radius: 4px; height: 20px; overflow: hidden; }
        .chart-bar { background: var(--primary-color); height: 100%; width: 0%; transition: width 0.5s ease; }
        .chart-value { width: 60px; text-align: right; font-size: 13px; margin-left: 5px; }
        .progress-bar { background: var(--success-color); }

        /* Gist設定セクション */
        .gist-container { border: 2px dashed #ccc; padding: 15px; border-radius: 8px; margin-top: 20px; background: #fffcf4; }
        .gist-container h4 { margin: 0 0 10px 0; color: var(--dark-color); }
        .gist-input { padding: 10px; font-size: 14px; margin-bottom: 10px; }
        .sync-status { font-size: 13px; font-weight: bold; margin-bottom: 10px; color: var(--gray-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>英単語トレーニング</h1>

    <div id="setup-screen">
        <div class="setting-group">
            <label for="vocabulary-select">単語帳の種類:</label>
            <select id="vocabulary-select" onchange="checkWeakWordCount()">
                <option value="NGSL" selected>NGSL (一般基本単語)</option>
                <option value="NAWL">NAWL (学術用英単語)</option>
                <option value="TSL">TSL (TOEIC向け英単語)</option>
                <option value="BSL">BSL (ビジネス用英単語)</option>
                <option value="SPACED_REPETITION">忘却曲線モード (要復習単語)</option>
                <option value="WEAK_WORDS">苦手な単語 (手動復習用)</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="question-count">一回ごとの出題数:</label>
            <select id="question-count">
                <option value="5">5問</option>
                <option value="10" selected>10問</option>
                <option value="20">20問</option>
                <option value="50">50問</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="quiz-mode">回答形式:</label>
            <select id="quiz-mode">
                <option value="4choice-en-ja">4択 (英 → 和)</option>
                <option value="4choice-ja-en">4択 (和 → 英)</option>
                <option value="card-know">単語カード (知っているかの確認)</option>
                <option value="fill-blank">例文穴埋め (記述式)</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="time-limit-select">一問あたりの制限時間:</label>
            <select id="time-limit-select">
                <option value="0">制限時間なし</option>
                <option value="10">10秒</option>
                <option value="20" selected>20秒 (基本)</option>
                <option value="30">30秒</option>
            </select>
        </div>

        <button id="start-btn" class="primary-btn" onclick="startQuiz()">練習を開始する</button>
        
        <div class="chart-container">
            <h3>各章の進捗状況 (修得率)</h3>
            <div id="progress-container"></div>
        </div>

        <div class="chart-container">
            <h3>過去7日間の学習実績 (秒)</h3>
            <div id="history-chart"></div>
        </div>

        <div class="gist-container">
            <h4>☁️ GitHub Gist クラウド同期設定</h4>
            <div id="gist-status" class="sync-status">ステータス: 未接続（ローカル保存中）</div>
            <input type="text" id="gist-id-input" class="gist-input" placeholder="Gist ID を入力">
            <input type="password" id="gist-token-input" class="gist-input" placeholder="GitHub トークン (ghp_...) を入力">
            <div style="display: flex; gap: 10px;">
                <button onclick="saveGistSettings()" style="background-color: var(--primary-color); padding: 10px; font-size: 14px;">連携してデータをロード</button>
                <button onclick="syncLocalToGist()" style="background-color: var(--success-color); padding: 10px; font-size: 14px;">手動バックアップ</button>
            </div>
        </div>

        <button onclick="clearLogs()" style="background-color: #95a5a6; padding: 8px; font-size: 12px; margin-top: 15px;">記録と苦手単語を初期化</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress" class="info-text"></div>
        
        <div id="timer-container" class="hidden">
            <div id="timer-text" class="timer-text">残り: 20秒</div>
            <div class="timer-wrapper">
                <div id="timer-bar" class="timer-bar"></div>
            </div>
        </div>

        <button class="audio-btn" onclick="playVoice()">🔊 発音を聞く</button>
        
        <div id="question-card" class="card">単語</div>
        
        <div id="options-container" class="btn-grid hidden"></div>
        
        <div id="card-container" class="hidden">
            <button onclick="toggleCardFlip()" style="background-color: var(--warning-color); padding: 18px;">意味を見る / 隠す</button>
            <div class="btn-grid" style="margin-top: 15px;">
                <button onclick="handleCardAnswer(true)" style="background-color: var(--success-color); padding: 18px;">知っている</button>
                <button onclick="handleCardAnswer(false)" style="background-color: var(--error-color); padding: 18px;">知らない</button>
            </div>
        </div>

        <div id="input-container" class="hidden">
            <input type="text" id="blank-input" placeholder="ここに英単語を入力" autocorrect="off" autocapitalize="none">
            <button onclick="handleBlankAnswer()" style="margin-top: 15px; background-color: var(--dark-color);">回答する</button>
        </div>
        
        <div id="example-area" class="example hidden"></div>

        <div class="action-grid">
            <button id="dont-know-btn" class="dont-know-btn" onclick="handleDontKnow()">わからない</button>
            <button class="quit-btn" onclick="handleQuitQuiz()">やめる</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>結果発表</h2>
        <p id="score-text" style="font-size: 20px; text-align: center; font-weight: bold; color: #333;"></p>
        <button class="primary-btn" onclick="returnToSetup()">設定に戻る</button>
    </div>
</div>

<script src="words.js"></script>
<script src="app.js"></script>
</body>
</html>
